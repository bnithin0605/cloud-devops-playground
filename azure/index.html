<!DOCTYPE html>
<html>

<head>
    <title>Student Count by Country</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f5f7fb;
            text-align: center;
            margin: 0;
            padding: 40px;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 25px;
        }

        #loadingMsg {
            font-size: 18px;
            color: #555;
            margin-top: 30px;
        }

        table {
            margin: 25px auto;
            border-collapse: collapse;
            width: 60%;
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
        }

        th {
            background-color: #4CAF50;
            color: white;
            padding: 12px;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background-color: #f2f2f2;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }
    </style>
</head>

<body>

    <h1>Student Count by Country</h1>

    <p id="loadingMsg">Please wait...Fetching details...</p>

    <table id="studentTable" style="display:none;">
        <thead>
            <tr>
                <th>Country</th>
                <th>Student Count</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        async function fetchStudentData() {

            const loading = document.getElementById("loadingMsg");
            const table = document.getElementById("studentTable");

            try {

                const response = await fetch("https://m17136422-api-gphbbjbsc5gvd0gq.centralus-01.azurewebsites.net/api/HttpTrigger1");
                const data = await response.json();

                const tableBody = document.querySelector('#studentTable tbody');

                tableBody.innerHTML = data.map(row =>
                    `<tr>
                        <td>${row.Country}</td>
                        <td>${row.StudentCount}</td>
                    </tr>`
                ).join('');

                loading.style.display = "none";
                table.style.display = "table";

            } catch (err) {
                loading.innerText = "Failed to load data. Please refresh.";
            }
        }

        fetchStudentData();
    </script>

</body>
</html>
